<section class="contact-form-section">

    <div class="container">

        <div class="contact-form-grid">

            <!-- CONTACT INFO -->
            <div class="contact-info">

                <span class="section-tag">
                    CONTACT US
                </span>

                <h2>
                    Let’s Discuss Your Project
                </h2>

                <p>
                    Reach out to discuss cybersecurity, infrastructure,
                    IT modernization, or managed support services.
                </p>

                <div class="contact-details">

                    <div class="contact-item">

                        <h4>Email</h4>
                        <p>info@myredteam.de</p>

                    </div>

                    <div class="contact-item">

                        <h4>Phone</h4>
                        <p>+49 XXX XXXXXXX</p>

                    </div>

                    <div class="contact-item">

                        <h4>Location</h4>
                        <p>Germany</p>

                    </div>

                </div>

            </div>

            <!-- FORM -->
            <form class="contact-form">

                <div class="form-group">

                    <input
                        type="text"
                        name="name"
                        placeholder="Full Name"
                        required
                    >

                </div>

                <div class="form-group">

                    <input
                        type="email"
                        name="email"
                        placeholder="Email Address"
                        required
                    >

                </div>

                <div class="form-group">

                    <input
                        type="text"
                        name="company"
                        placeholder="Company Name"
                    >

                </div>

                <div class="form-group">

                    <textarea
                        name="message"
                        rows="6"
                        placeholder="Tell us about your project..."
                        required
                    ></textarea>

                </div>

                <button type="submit" class="btn btn-primary">

                    Send Message

                </button>

            </form>

        </div>

    </div>

</section>
